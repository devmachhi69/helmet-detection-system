<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
        }

        .navbar {
            background: #111;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
        }

        .navbar a:hover {
            color: #00bcd4;
        }

        .container {
            width: 90%;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 30px;
        }

        .card-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            background: #ffffff;
            width: 250px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 15px;
        }

        .btn {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-top: 10px;
        }

        .btn:hover {
            background: #0056b3;
        }

        .logout {
            background: #dc3545;
        }

        .logout:hover {
            background: #a71d2a;
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/upload">Upload</a>
    <a href="/gallery">Violations</a>
    <a href="/logs">Logs</a>
    <a href="/logout" class="logout">Logout</a>
</div>

<div class="container">
    <h2>Admin Dashboard</h2>

    <div class="card-container">

        <div class="card">
            <h3>Upload Video</h3>
            <p>Upload helmet detection video</p>
            <a href="/upload" class="btn">Upload</a>
        </div>

        <div class="card">
            <h3>View Violations</h3>
            <p>Check captured screenshots</p>
            <a href="/gallery" class="btn">View</a>
        </div>

        <div class="card">
            <h3>View Logs</h3>
            <p>See detection history</p>
            <a href="/logs" class="btn">Logs</a>
        </div>

    </div>
</div>

</body>
</html>
